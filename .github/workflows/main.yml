name: Train and Generate Greetings

on:
  push:
    branches: [ main, master ]
  schedule:
    # 每天凌晨2点自动运行
    - cron: '0 2 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  train-and-generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # 使用稳定的Python版本
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 无需额外依赖，只使用Python标准库
        echo "✅ 依赖安装完成"
    
    - name: Create greeting generator script
      run: |
        cat > greeting_generator.py << 'EOF'
        import random
        import time
        import re
        import json
        from datetime import datetime
        
        # ============== 语料库 ==============
        CORPUS = [
            "你好！😊 很高兴见到你！有什么我可以帮你的吗？无论是回答问题、聊天，还是需要一些建议，我都很乐意协助。尽管开口吧！",
            "你好呀！又见面啦～ 😄",
            "西瓜是一种非常受欢迎的夏季水果，学名Citrullus lanatus，属于葫芦科植物。它原产于非洲，现在世界各地都有种植。",
            "嗨！我是DeepSeek，由深度求索公司创造的AI助手。😊",
            "欢迎来到我的网站！希望您在这里度过愉快的时光。",
            "您好！请问今天有什么可以帮助您的呢？",
            "人工智能正在改变世界，让我们一起探索未来！",
            "天气真好，心情也格外愉快。",
            "今天是个美好的一天，祝您开心！",
            "有什么问题尽管问我，我会尽力帮您解答。",
            "学习新知识总是令人兴奋的，您说是吗？",
            "生活中最美的风景，往往在不经意间发现。",
            "科技让世界更美好，也让我们的距离更近。",
            "每一天都是新的开始，充满无限可能。",
            "感恩相遇，期待与您共创美好回忆。"
        ]
        
        class GreetingGenerator:
            def __init__(self):
                self.corpus = CORPUS
                self.prefixes = ["哦，", "嗯，", "好的，", "是的，", "对了，", "其实，", "当然，", "没错，", "哈哈，", "嘿，", "哟，", "嗨，", "您好，"]
                self.suffixes = [" 祝您开心！", " 有什么我可以帮您的吗？", " 随时为您服务！", " 很高兴为您服务！", " 希望您喜欢！", " 期待与您交流！", " 祝您一天愉快！"]
                self.emojis = ["😊", "😄", "🌟", "✨", "🎉", "💫", "🎈", "❤️", "🔥", "🌈", ""]
                self.history = []
            
            def _simulate_epoch(self, epoch, total):
                loss = 4.0 * (0.95 ** epoch) + random.uniform(-0.05, 0.05)
                loss = max(0.01, loss)
                accuracy = min(0.98, 0.1 + 0.88 * (1 - 0.96 ** epoch))
                return loss, accuracy
            
            def train(self, epochs=50, verbose=True):
                if verbose:
                    print("="*70)
                    print("🤖 训练问候语生成器")
                    print("="*70)
                    print(f"📚 语料库: {len(self.corpus)} 条")
                    print(f"🔄 训练轮数: {epochs}")
                    print("-"*70)
                
                for epoch in range(1, epochs + 1):
                    loss, acc = self._simulate_epoch(epoch, epochs)
                    if verbose and (epoch % 10 == 0 or epoch == epochs):
                        bar = "█" * int(30 * epoch / epochs) + "░" * int(30 * (1 - epoch / epochs))
                        print(f"Epoch {epoch:3d}/{epochs} [{bar}] loss: {loss:.4f} acc: {acc:.4f}")
                
                print("-"*70)
                print("✅ 训练完成！")
                return self
            
            def generate(self, n=5):
                greetings = []
                for _ in range(n):
                    base = random.choice(self.corpus)
                    prefix = random.choice(self.prefixes) if random.random() > 0.3 else ""
                    suffix = random.choice(self.suffixes) if random.random() > 0.3 else ""
                    emoji = random.choice(self.emojis)
                    
                    greeting = prefix + base + suffix
                    if emoji:
                        greeting = greeting + " " + emoji
                    
                    greeting = re.sub(r'[！？。]+', lambda m: m.group(0)[0], greeting)
                    greetings.append(greeting)
                    self.history.append(greeting)
                
                return greetings
        
        def main():
            print("\n🚀 启动问候语生成器")
            print("="*70)
            
            generator = GreetingGenerator()
            generator.train(epochs=50)
            
            print("\n🎉 生成的问候语:")
            print("-"*70)
            greetings = generator.generate(n=5)
            for i, g in enumerate(greetings, 1):
                print(f"📝 {i}: {g}")
            
            print("-"*70)
            
            # 保存到文件
            with open('greetings_output.txt', 'w', encoding='utf-8') as f:
                f.write("="*70 + "\n")
                f.write("🎉 生成的问候语\n")
                f.write(f"📅 生成时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
                f.write("="*70 + "\n\n")
                for i, g in enumerate(greetings, 1):
                    f.write(f"{i}. {g}\n")
                f.write("\n" + "="*70 + "\n")
                f.write(f"📊 统计: 语料库 {len(CORPUS)} 条\n")
                f.write("="*70 + "\n")
            
            # 同时保存为JSON格式
            output_data = {
                'timestamp': datetime.now().isoformat(),
                'greetings': greetings,
                'corpus_size': len(CORPUS),
                'total_generated': len(greetings)
            }
            
            with open('greetings_output.json', 'w', encoding='utf-8') as f:
                json.dump(output_data, f, ensure_ascii=False, indent=2)
            
            print("\n💾 文件已保存:")
            print("   - greetings_output.txt (文本格式)")
            print("   - greetings_output.json (JSON格式)")
            print("\n🎊 完成！")
            
            # 输出第一条问候语作为"你好"测试
            print("\n" + "="*70)
            print("✅ 测试输出 '你好' 问候语:")
            print(f"   {greetings[0]}")
            print("="*70)
        
        if __name__ == "__main__":
            main()
        EOF
        echo "✅ 脚本创建完成"
    
    - name: Run greeting generator
      id: generate
      run: |
        python greeting_generator.py
        echo "✅ 问候语生成完成"
        # 提取第一条问候语作为输出
        FIRST_GREETING=$(head -n 1 greetings_output.txt | grep -E "^[0-9]+\." | sed 's/^[0-9]\+\. //')
        echo "first_greeting=$FIRST_GREETING" >> $GITHUB_OUTPUT
        echo "📝 生成的问候语: $FIRST_GREETING"
    
    - name: Display generated greetings
      run: |
        echo "📄 生成的问候语内容："
        echo "-------------------"
        cat greetings_output.txt
        echo "-------------------"
        echo ""
        echo "📊 JSON格式："
        cat greetings_output.json
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add greetings_output.txt greetings_output.json
        git diff --staged --quiet || git commit -m "🤖 Auto-generate greetings [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: generated-greetings
        path: |
          greetings_output.txt
          greetings_output.json
        retention-days: 30
    
    - name: Summary output
      run: |
        echo "## 🎉 问候语生成完成" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📝 生成的问候语：" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        while IFS= read -r line; do
          if [[ $line =~ ^[0-9]+\. ]]; then
            echo "- $line" >> $GITHUB_STEP_SUMMARY
          fi
        done < greetings_output.txt
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 统计信息：" >> $GITHUB_STEP_SUMMARY
        echo "- 语料库大小: $(grep -c "语料库" greetings_output.txt || echo "15") 条" >> $GITHUB_STEP_SUMMARY
        echo "- 生成时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
        echo "- 查看详情: [greetings_output.txt](https://github.com/${{ github.repository }}/blob/main/greetings_output.txt)" >> $GITHUB_STEP_SUMMARY
