name: Train Neural Network and Release Model

on:
  push:
    branches: [ main, master ]
    paths:
      - 'words.json'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      chat_message:
        description: '💬 输入聊天消息测试'
        required: false
        default: '你好'
        type: string
      add_phrase:
        description: '✏️ 添加新词句到语料库（格式：类别:内容）'
        required: false
        default: ''
        type: string
      epochs:
        description: '🎯 训练轮数'
        required: false
        default: '30'
        type: number
      release_tag:
        description: '📦 Release 标签（如：v1.0.0）'
        required: false
        default: ''
        type: string

jobs:
  train-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Create requirements.txt
      run: |
        cat > requirements.txt << 'EOF'
        tensorflow>=2.13.0
        numpy>=1.24.0
        EOF
        echo "✅ requirements.txt 已创建"
    
    - name: Install neural network libraries
      run: |
        echo "📦 开始安装神经网络库..."
        echo "----------------------------------------"
        pip install --upgrade pip
        pip install -r requirements.txt
        echo "----------------------------------------"
        echo "✅ 安装完成"
        python -c "import tensorflow as tf; print(f'TensorFlow 版本: {tf.__version__}')"
        python -c "import numpy as np; print(f'NumPy 版本: {np.__version__}')"
    
    - name: Create neural network training script
      run: |
        cat > train_nn.py << 'EOF'
        import json
        import os
        import sys
        import random
        import re
        import numpy as np
        import tensorflow as tf
        from tensorflow import keras
        from tensorflow.keras import layers
        from datetime import datetime
        
        print("="*70)
        print("🧠 神经网络训练器（回退方案优先）")
        print("="*70)
        print(f"TensorFlow 版本: {tf.__version__}")
        print(f"NumPy 版本: {np.__version__}")
        print("="*70)
        
        # ============== 配置 ==============
        LSTM_UNITS = 128
        BATCH_SIZE = 32
        
        # ============== 默认语料库（保留中文字符） ==============
        DEFAULT_WORDS = {
            "version": "2.0",
            "created_at": datetime.now().isoformat(),
            "last_updated": datetime.now().isoformat(),
            "corpus": {
                "greetings": [
                    "你好很高兴见到你有什么我可以帮你的吗",
                    "你好呀又见面啦",
                    "嗨我是DeepSeek由深度求索公司创造的AI助手",
                    "欢迎来到我的网站希望您在这里度过愉快的时光",
                    "您好请问今天有什么可以帮助您的呢"
                ],
                "python_print": [
                    "我来为你生成Python打印代码printHelloWorld",
                    "格式化打印f姓名name",
                    "不换行打印printHelloend"
                ],
                "gudao_info": [
                    "Gudao是一个个人网站网址为gudaowebpagesdev",
                    "Gudao由个人搭建目前已有多个实用项目"
                ],
                "general": [
                    "人工智能正在改变世界让我们一起探索未来",
                    "今天是个美好的一天祝您开心"
                ],
                "ai_questions": [
                    "人工智能AI是计算机科学的一个分支致力于创建能够执行通常需要人类智能的任务的系统",
                    "深度学习是机器学习的一个子集它使用神经网络来模拟人脑的工作方式",
                    "自然语言处理NLP是AI的一个领域专注于让计算机理解和生成人类语言",
                    "AI的应用非常广泛包括图像识别语音助手推荐系统自动驾驶等",
                    "大语言模型LLM如GPT4Claude和DeepSeek能够理解和生成自然语言文本"
                ]
            },
            "intent_patterns": {
                "打印|print|python打印|代码": "python_print",
                "gudao|网站|个人网站|gudaoweb": "gudao_info",
                "你好|嗨|hello|hi|您好": "greetings",
                "人工智能|AI|机器学习|深度学习|神经网络|自然语言处理|大语言模型|LLM": "ai_questions"
            },
            "training_stats": {
                "total_phrases": 0,
                "categories": 0,
                "last_training": None,
                "model_accuracy": None,
                "model_loss": None
            }
        }
        
        def clean_text(text):
            # 保留中文字符、字母、数字、常用标点，移除表情和特殊符号
            cleaned = re.sub(r'[^\u4e00-\u9fa5a-zA-Z0-9，。！？、：；""''（）\n]', '', text)
            return cleaned
        
        class RuleBasedGenerator:
            """基于规则的生成器（回退方案）"""
            def __init__(self, corpus, intent_patterns):
                self.corpus = corpus
                self.intent_patterns = intent_patterns
                self.prefixes = ["哦，", "嗯，", "好的，", "是的，", "其实，", "当然，", "我理解，", "关于这个问题，", ""]
                self.suffixes = [" 😊", " 😄", " 🌟", " ✨", " 🚀", " 💻", " 🎉", ""]
            
            def generate_response(self, user_input):
                user_lower = user_input.lower()
                matched_category = None
                for pattern, category in self.intent_patterns.items():
                    if any(keyword in user_lower for keyword in pattern.split('|')):
                        matched_category = category
                        break
                
                if matched_category and matched_category in self.corpus:
                    phrases = self.corpus[matched_category]
                    if phrases:
                        response = random.choice(phrases)
                    else:
                        response = random.choice(self.corpus.get('general', ['你好']))
                else:
                    # 从所有句子中随机选
                    all_phrases = []
                    for cat in self.corpus.values():
                        all_phrases.extend(cat)
                    if all_phrases:
                        response = random.choice(all_phrases)
                    else:
                        response = "你好，很高兴见到你！"
                
                # 添加前后缀
                prefix = random.choice(self.prefixes) if random.random() > 0.3 else ""
                suffix = random.choice(self.suffixes) if random.random() > 0.3 else ""
                return prefix + response + suffix
            
            def generate_greetings(self, n=6):
                all_phrases = []
                for cat in self.corpus.values():
                    all_phrases.extend(cat)
                if not all_phrases:
                    all_phrases = ["你好"]
                greetings = []
                for _ in range(n):
                    base = random.choice(all_phrases)
                    prefix = random.choice(self.prefixes) if random.random() > 0.4 else ""
                    suffix = random.choice(self.suffixes) if random.random() > 0.4 else ""
                    greetings.append(prefix + base + suffix)
                return greetings
        
        class NeuralChatBot:
            def __init__(self, words_file='words.json'):
                self.words_file = words_file
                self.words_data = self._load_or_create_words()
                self.corpus = self._build_corpus()
                self.char2idx = {}
                self.idx2char = {}
                self.vocab_size = 0
                self.model = None
                self.seq_length = 15
                self.model_path = 'model.keras'
                # 初始化规则生成器
                self.rule_gen = RuleBasedGenerator(
                    self.words_data.get('corpus', {}),
                    self.words_data.get('intent_patterns', {})
                )
            
            def _load_or_create_words(self):
                if os.path.exists(self.words_file):
                    try:
                        with open(self.words_file, 'r', encoding='utf-8') as f:
                            data = json.load(f)
                        print(f"✅ 加载 words.json: {len(data.get('corpus', {}))} 个类别")
                        return data
                    except Exception as e:
                        print(f"⚠️ 加载失败: {e}, 使用默认语料库")
                        return DEFAULT_WORDS.copy()
                else:
                    print("📝 words.json 不存在，创建默认语料库")
                    return DEFAULT_WORDS.copy()
            
            def _build_corpus(self):
                corpus = {}
                for category, phrases in self.words_data.get('corpus', {}).items():
                    cleaned_list = []
                    for phrase in phrases:
                        cleaned = clean_text(phrase)
                        if cleaned:
                            cleaned_list.append(cleaned)
                    if cleaned_list:
                        corpus[category] = cleaned_list
                # 如果所有类别都为空，使用默认
                if not corpus:
                    print("⚠️ 语料库为空，使用默认语料")
                    for category, phrases in DEFAULT_WORDS['corpus'].items():
                        cleaned_list = []
                        for phrase in phrases:
                            cleaned = clean_text(phrase)
                            if cleaned:
                                cleaned_list.append(cleaned)
                        if cleaned_list:
                            corpus[category] = cleaned_list
                return corpus
            
            def add_phrase(self, category, phrase):
                cleaned = clean_text(phrase)
                if not cleaned:
                    print("⚠️ 词句为空，跳过")
                    return
                if category not in self.corpus:
                    self.corpus[category] = []
                self.corpus[category].append(cleaned)
                # 更新 words_data 并保存
                if category not in self.words_data['corpus']:
                    self.words_data['corpus'][category] = []
                self.words_data['corpus'][category].append(cleaned)
                self.words_data['last_updated'] = datetime.now().isoformat()
                self._save_words()
                print(f"✅ 添加词句: [{category}] {cleaned[:30]}...")
            
            def _save_words(self):
                with open(self.words_file, 'w', encoding='utf-8') as f:
                    json.dump(self.words_data, f, ensure_ascii=False, indent=2)
            
            def _build_vocab(self):
                # 从所有语料中提取字符
                all_text = ''.join([phrase for cat in self.corpus.values() for phrase in cat])
                if not all_text:
                    all_text = "你好世界"
                chars = sorted(set(all_text))
                self.char2idx = {char: idx for idx, char in enumerate(chars)}
                self.idx2char = {idx: char for char, idx in self.char2idx.items()}
                self.vocab_size = len(chars)
                print(f"🔤 词汇表大小: {self.vocab_size} 个字符")
                return self
            
            def _prepare_data(self, seq_length=15):
                # 合并所有语料为一个长字符串
                all_text = ''.join([phrase for cat in self.corpus.values() for phrase in cat])
                if not all_text:
                    all_text = "你好世界"
                
                valid_chars = set(self.char2idx.keys())
                filtered_text = ''.join([c for c in all_text if c in valid_chars])
                
                if not filtered_text:
                    raise ValueError("filtered_text is empty, cannot prepare training data.")
                
                if len(filtered_text) < seq_length + 1:
                    repeat_times = (seq_length + 1) // len(filtered_text) + 1
                    filtered_text = (filtered_text * repeat_times)[:seq_length + 1]
                
                sequences = []
                next_chars = []
                for i in range(0, len(filtered_text) - seq_length):
                    seq = filtered_text[i:i+seq_length]
                    next_char = filtered_text[i+seq_length]
                    sequences.append([self.char2idx[char] for char in seq])
                    next_chars.append(self.char2idx[next_char])
                
                if not sequences:
                    seq = filtered_text[:seq_length]
                    next_char = filtered_text[seq_length] if len(filtered_text) > seq_length else seq[0]
                    sequences = [[self.char2idx[c] for c in seq]]
                    next_chars = [self.char2idx[next_char]]
                
                X = np.array(sequences)
                y = np.array(next_chars)
                X_one_hot = tf.one_hot(X, depth=self.vocab_size)
                y_one_hot = tf.one_hot(y, depth=self.vocab_size)
                print(f"📊 训练样本数: {len(X)}")
                print(f"📐 输入形状: {X_one_hot.shape}")
                return X_one_hot, y_one_hot
            
            def build_model(self):
                self._build_vocab()
                model = keras.Sequential([
                    layers.LSTM(LSTM_UNITS, 
                                input_shape=(self.seq_length, self.vocab_size),
                                return_sequences=True,
                                dropout=0.2),
                    layers.LSTM(LSTM_UNITS // 2,
                                dropout=0.2),
                    layers.Dense(self.vocab_size, activation='softmax')
                ])
                model.compile(
                    optimizer=keras.optimizers.Adam(learning_rate=0.01),
                    loss='categorical_crossentropy',
                    metrics=['accuracy']
                )
                print("\n🧠 模型架构:")
                print(model.summary())
                self.model = model
                return model
            
            def train(self, epochs=100, verbose=True):
                if verbose:
                    print("\n" + "="*70)
                    print("🚀 开始训练神经网络")
                    print("="*70)
                    # 统计总语料条数
                    total_phrases = sum(len(v) for v in self.corpus.values())
                    print(f"📚 语料库: {total_phrases} 条词句")
                    print(f"📂 类别数: {len(self.corpus)} 个")
                    print(f"🔄 训练轮数: {epochs}")
                    print("-"*70)
                
                try:
                    self._build_vocab()
                    X_train, y_train = self._prepare_data(self.seq_length)
                    num_samples = len(X_train)
                    if num_samples < 10:
                        print(f"⚠️ 训练样本太少（{num_samples}），无法有效训练，跳过神经网络训练")
                        return None
                    
                    if self.model is None:
                        self.build_model()
                    
                    callbacks = [
                        keras.callbacks.EarlyStopping(patience=10, restore_best_weights=True),
                        keras.callbacks.ReduceLROnPlateau(factor=0.5, patience=5)
                    ]
                    
                    val_split = min(0.1, 1 - 1/num_samples) if num_samples > 10 else 0.0
                    print(f"📊 训练样本数: {num_samples}, 验证集比例: {val_split:.2f}")
                    
                    history = self.model.fit(
                        X_train, y_train,
                        epochs=epochs,
                        batch_size=min(BATCH_SIZE, num_samples),
                        validation_split=val_split,
                        verbose=1 if verbose else 0,
                        callbacks=callbacks
                    )
                    
                    final_acc = history.history['accuracy'][-1]
                    final_loss = history.history['loss'][-1]
                    
                    self.model.save(self.model_path)
                    print(f"💾 模型已保存到: {self.model_path}")
                    # 同时保存h5
                    self.model.save('model.h5')
                    print(f"💾 模型已保存到: model.h5")
                    
                    self.words_data['training_stats']['last_training'] = datetime.now().isoformat()
                    self.words_data['training_stats']['model_accuracy'] = float(final_acc)
                    self.words_data['training_stats']['model_loss'] = float(final_loss)
                    self.words_data['training_stats']['total_phrases'] = total_phrases
                    self.words_data['training_stats']['categories'] = len(self.corpus)
                    self._save_words()
                    
                    if verbose:
                        print("-"*70)
                        print("✅ 训练完成！")
                        print(f"📊 最终准确率: {final_acc:.4f}")
                        print(f"📊 最终损失: {final_loss:.4f}")
                        print("="*70)
                    return history
                    
                except Exception as e:
                    print(f"⚠️ 训练过程中出错: {e}")
                    import traceback
                    traceback.print_exc()
                    print("📝 使用规则生成作为回退")
                    return None
            
            def generate_response(self, user_input):
                # 优先使用规则生成（稳定）
                response = self.rule_gen.generate_response(user_input)
                # 如果模型可用，尝试增强（但仅在规则生成太简单时）
                # 这里暂时直接返回规则生成结果，确保质量
                return response
            
            def generate_greetings(self, n=6):
                return self.rule_gen.generate_greetings(n)
        
        def main():
            user_message = sys.argv[1] if len(sys.argv) > 1 else "你好Gudao是什么"
            add_phrase = sys.argv[2] if len(sys.argv) > 2 else ""
            epochs = int(sys.argv[3]) if len(sys.argv) > 3 else 30
            
            print("\n🚀 启动智能助手（混合模式）")
            print("="*70)
            
            bot = NeuralChatBot('words.json')
            
            if add_phrase and ':' in add_phrase:
                category, phrase = add_phrase.split(':', 1)
                bot.add_phrase(category.strip(), phrase.strip())
            
            # 尝试训练（如果样本足够）
            bot.train(epochs=epochs)
            
            print("\n🎉 生成的问候语:")
            print("-"*70)
            greetings = bot.generate_greetings(n=6)
            for i, g in enumerate(greetings, 1):
                print(f"📝 {i}: {g}")
            
            print("-"*70)
            
            print("\n💬 聊天对话:")
            print("-"*70)
            response = bot.generate_response(user_message)
            print(f"👤 用户: {user_message}")
            print(f"🤖 AI: {response}")
            
            print("-"*70)
            
            stats = bot.words_data.get('training_stats', {})
            print("\n📊 统计:")
            print(f"   - 语料类别: {len(bot.corpus)} 个")
            print(f"   - 总词句: {sum(len(v) for v in bot.corpus.values())} 条")
            if stats.get('model_accuracy'):
                print(f"   - 模型准确率: {stats['model_accuracy']:.4f}")
            else:
                print("   - 模型准确率: 未训练或训练失败")
            
            with open('greetings_output.txt', 'w', encoding='utf-8') as f:
                f.write("="*70 + "\n")
                f.write("🧠 智能助手输出\n")
                f.write(f"📅 生成时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
                f.write("="*70 + "\n\n")
                f.write("🎉 生成的问候语:\n")
                f.write("-"*70 + "\n")
                for i, g in enumerate(greetings, 1):
                    f.write(f"{i}. {g}\n")
                f.write("\n" + "="*70 + "\n")
                f.write("💬 聊天对话\n")
                f.write("-"*70 + "\n")
                f.write(f"👤 用户: {user_message}\n")
                f.write(f"🤖 AI: {response}\n")
                f.write("\n" + "="*70 + "\n")
                f.write("📊 统计\n")
                f.write("-"*70 + "\n")
                f.write(f"语料类别: {len(bot.corpus)} 个\n")
                f.write(f"总词句: {sum(len(v) for v in bot.corpus.values())} 条\n")
                if stats.get('model_accuracy'):
                    f.write(f"模型准确率: {stats['model_accuracy']:.4f}\n")
                else:
                    f.write("模型准确率: 未训练或训练失败\n")
                f.write("="*70 + "\n")
            
            print("\n" + "="*70)
            print("✅ 完成！")
            print("="*70)
        
        if __name__ == "__main__":
            main()
        EOF
        echo "✅ 神经网络训练脚本已创建"
    
    - name: Run neural network training
      id: train
      run: |
        if [ -n "${{ github.event.inputs.chat_message }}" ]; then
          CHAT_MSG="${{ github.event.inputs.chat_message }}"
        else
          CHAT_MSG="你好Gudao是什么"
        fi
        
        ADD_PHRASE="${{ github.event.inputs.add_phrase }}"
        EPOCHS="${{ github.event.inputs.epochs || 30 }}"
        
        echo "💬 用户消息: $CHAT_MSG"
        echo "🎯 训练轮数: $EPOCHS"
        
        if [ -n "$ADD_PHRASE" ]; then
          echo "✏️ 添加词句: $ADD_PHRASE"
          python train_nn.py "$CHAT_MSG" "$ADD_PHRASE" "$EPOCHS"
        else
          python train_nn.py "$CHAT_MSG" "" "$EPOCHS"
        fi
        
        AI_RESPONSE=$(grep "🤖 AI:" greetings_output.txt | head -1 | sed 's/🤖 AI: //')
        echo "ai_response=$AI_RESPONSE" >> $GITHUB_OUTPUT
        echo "✅ 训练完成"
    
    - name: Display results
      run: |
        echo "📄 训练结果："
        echo "-------------------"
        cat greetings_output.txt
        echo "-------------------"
        echo ""
        echo "📊 words.json 内容预览："
        echo "-------------------"
        head -80 words.json
        echo ""
        echo "📦 模型文件："
        echo "-------------------"
        if [ -f "model.keras" ]; then
          ls -lh model.keras
          echo "✅ model.keras 存在"
        else
          echo "⚠️ model.keras 不存在"
        fi
        if [ -f "model.h5" ]; then
          ls -lh model.h5
          echo "✅ model.h5 存在"
        fi
    
    - name: Create Release
      id: create_release
      run: |
        if [ -n "${{ github.event.inputs.release_tag }}" ]; then
          TAG="${{ github.event.inputs.release_tag }}"
        else
          TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
        fi
        
        echo "TAG=$TAG" >> $GITHUB_OUTPUT
        
        RELEASE_FILES="words.json greetings_output.txt"
        if [ -f "model.keras" ]; then
          RELEASE_FILES="$RELEASE_FILES model.keras"
          echo "✅ 包含模型文件 model.keras"
        fi
        if [ -f "model.h5" ]; then
          RELEASE_FILES="$RELEASE_FILES model.h5"
          echo "✅ 包含模型文件 model.h5"
        fi
        
        gh release create "$TAG" \
          $RELEASE_FILES \
          --title "🤖 模型发布: $TAG" \
          --notes "## 🧠 智能助手发布
          
          ### 📊 统计
          - 语料类别: $(grep -o '"categories": [0-9]*' words.json | head -1 | grep -o '[0-9]*') 个
          - 总词句: $(grep -o '"total_phrases": [0-9]*' words.json | head -1 | grep -o '[0-9]*') 条
          - 模型准确率: $(grep -o '"model_accuracy": [0-9.]*' words.json | head -1 | grep -o '[0-9.]*')
          
          ### 📅 发布时间
          $(date '+%Y-%m-%d %H:%M:%S')
          
          ### 📁 包含文件
          $(if [ -f "model.keras" ]; then echo "- \`model.keras\` - 训练好的神经网络模型"; else echo "- ⚠️ 模型不可用（使用规则生成）"; fi)
          - \`words.json\` - 语料库
          - \`greetings_output.txt\` - 输出结果"
          
        echo "✅ Release 创建成功: $TAG"
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
        
        git add words.json greetings_output.txt 2>/dev/null || true
        if [ -f "model.keras" ]; then
          git add model.keras
        fi
        if [ -f "model.h5" ]; then
          git add model.h5
        fi
        
        if ! git diff --staged --quiet; then
          git commit -m "🧠 Neural network training with words.json [skip ci]"
          
          echo "🔄 尝试拉取远程更改并变基..."
          git pull origin main --rebase || true
          
          if ! git push origin main; then
            echo "⚠️ 推送失败，尝试强制推送..."
            git push origin main --force-with-lease
          fi
          echo "✅ 文件已提交并推送"
        else
          echo "✅ 没有新的更改需要提交"
        fi
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: neural-network-results
        path: |
          words.json
          greetings_output.txt
          model.keras
          model.h5
        retention-days: 30
        if-no-files-found: warn
    
    - name: Summary output
      run: |
        echo "## 🧠 智能助手完成" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 💬 测试对话" >> $GITHUB_STEP_SUMMARY
        echo "- 用户: ${{ github.event.inputs.chat_message || '你好Gudao是什么' }}" >> $GITHUB_STEP_SUMMARY
        echo "- AI: ${{ steps.train.outputs.ai_response }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 统计" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        python -c "
        import json
        with open('words.json', 'r', encoding='utf-8') as f:
            data = json.load(f)
        stats = data.get('training_stats', {})
        print(f\"- 总词句: {stats.get('total_phrases', 0)} 条\")
        print(f\"- 类别数: {stats.get('categories', 0)} 个\")
        print(f\"- 模型准确率: {stats.get('model_accuracy', 'N/A')}\")
        " >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Release" >> $GITHUB_STEP_SUMMARY
        echo "- 标签: ${{ steps.create_release.outputs.TAG }}" >> $GITHUB_STEP_SUMMARY
        echo "- [查看 Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_release.outputs.TAG }})" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📁 文件链接" >> $GITHUB_STEP_SUMMARY
        echo "- [words.json](https://github.com/${{ github.repository }}/blob/main/words.json)" >> $GITHUB_STEP_SUMMARY
        echo "- [greetings_output.txt](https://github.com/${{ github.repository }}/blob/main/greetings_output.txt)" >> $GITHUB_STEP_SUMMARY
        if [ -f "model.keras" ]; then
          echo "- [model.keras](https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_release.outputs.TAG }})" >> $GITHUB_STEP_SUMMARY
        fi
